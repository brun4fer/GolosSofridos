<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AP - Golos Sofridos - Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: #0b1220;
        color: #e5eefc;
      }
      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #c2d4f5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Modo offline ativo</h1>
      <p>A ligacao caiu temporariamente. Assim que a internet voltar, atualiza para carregar os dados mais recentes.</p>
    </main>
  </body>
</html>
